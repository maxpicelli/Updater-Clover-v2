<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Certifica App Icon</title>
  <desc id="desc">A HUD-style circular interface icon with "Certifica" branding on a dark blue background.</desc>

  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#0d2a6e" />
      <stop offset="60%" stop-color="#061550" />
      <stop offset="100%" stop-color="#020b30" />
    </radialGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a4db5" />
      <stop offset="100%" stop-color="#0d2870" />
    </linearGradient>

    <!-- Inner disk gradient -->
    <radialGradient id="innerGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e5acc" />
      <stop offset="100%" stop-color="#0a1f6e" />
    </radialGradient>

    <!-- Badge/shield gradient -->
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e60d8" />
      <stop offset="100%" stop-color="#0c2e90" />
    </linearGradient>

    <!-- Progress arc gradient -->
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0392b" />
      <stop offset="55%" stop-color="#e74c3c" />
      <stop offset="100%" stop-color="#f39c12" />
    </linearGradient>

    <!-- Glow filter for HUD elements -->
    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#3a7fff" flood-opacity="0.7" />
    </filter>

    <!-- Orange glow for accents -->
    <filter id="orangeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f39c12" flood-opacity="0.8" />
    </filter>

    <!-- Subtle shadow -->
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5" />
    </filter>

    <!-- Grid pattern for background -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(80,130,255,0.08)" stroke-width="0.7"/>
    </pattern>

    <!-- Tick marks pattern for progress ring -->
    <pattern id="ticks" patternUnits="userSpaceOnUse" width="8" height="16">
      <rect x="3" y="0" width="2" height="12" fill="#d44" opacity="0.9"/>
    </pattern>
  </defs>

  <!-- ─── BACKGROUND ─── -->
  <rect width="512" height="512" fill="url(#bgGrad)" />
  <!-- Grid overlay -->
  <rect width="512" height="512" fill="url(#grid)" opacity="0.7" />
  <!-- Horizontal scan lines -->
  <rect width="512" height="512" fill="none" stroke="rgba(40,90,200,0.04)" stroke-width="1"
        style="background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(40,90,200,0.04) 3px, rgba(40,90,200,0.04) 4px)" />

  <!-- ─── OUTER DECORATIVE RING (track) ─── -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(60,120,220,0.25)" stroke-width="2" filter="url(#blueGlow)" />
  <circle cx="256" cy="256" r="215" fill="none" stroke="rgba(30,80,180,0.5)" stroke-width="3" />

  <!-- ─── MAIN OUTER RING (filled arc area) ─── -->
  <circle cx="256" cy="256" r="205" fill="url(#ringGrad)" filter="url(#softShadow)" />
  <circle cx="256" cy="256" r="203" fill="none" stroke="rgba(80,150,255,0.4)" stroke-width="1.5" />

  <!-- ─── PROGRESS ARC (top portion ~270° of arc = red ticks) ─── -->
  <!-- Arc track background -->
  <path d="M 256 56 A 200 200 0 1 1 255.9 56" fill="none"
        stroke="rgba(20,50,130,0.6)" stroke-width="22" stroke-linecap="butt"
        stroke-dasharray="1100 1300" stroke-dashoffset="-80" />

  <!-- Red tick-bar arc (270° sweep from ~135° to ~45°, i.e. left-bottom around top to right) -->
  <!-- Using stroke-dasharray trick for the sweep -->
  <circle cx="256" cy="256" r="193" fill="none"
          stroke="none" />

  <!-- Individual tick marks along the arc - simulated by a thick dashed stroke -->
  <path d="M 130 130 A 180 180 0 0 1 382 130"
        fill="none" stroke="url(#arcGrad)" stroke-width="18"
        stroke-dasharray="4 4.5" stroke-linecap="butt"
        filter="url(#orangeGlow)" />

  <!-- ─── "100%" LABEL ─── -->
  <text x="358" y="140" font-family="'Courier New', monospace" font-size="28" font-weight="bold"
        fill="#f5a623" filter="url(#orangeGlow)" text-anchor="middle">100%</text>

  <!-- ─── COORDINATES (right side, vertical) ─── -->
  <text transform="translate(418,285) rotate(90)" font-family="'Courier New', monospace"
        font-size="13" fill="#f5a623" opacity="0.85" text-anchor="middle">
    40°42.8562' / 74°0.3582'
  </text>

  <!-- ─── INNER DISK ─── -->
  <circle cx="256" cy="256" r="165" fill="#0d2060" stroke="rgba(50,110,220,0.5)" stroke-width="3" />
  <circle cx="256" cy="256" r="160" fill="url(#innerGrad)" />
  <circle cx="256" cy="256" r="157" fill="none" stroke="rgba(80,150,255,0.2)" stroke-width="1" />

  <!-- ─── GEAR / SHIELD SHAPE ─── -->
  <!-- Outer gear ring -->
  <g filter="url(#blueGlow)" opacity="0.9">
    <circle cx="256" cy="256" r="130" fill="none" stroke="#1a4db5" stroke-width="28" />

    <!-- Gear teeth - 12 rectangles around the circle -->
    <g fill="#1a4db5">
      <rect x="248" y="118" width="16" height="22" rx="3" />
      <rect x="248" y="372" width="16" height="22" rx="3" />
      <rect x="118" y="248" width="22" height="16" rx="3" />
      <rect x="372" y="248" width="22" height="16" rx="3" />

      <!-- Diagonal teeth -->
      <g transform="rotate(30, 256, 256)"><rect x="248" y="118" width="16" height="22" rx="3" /></g>
      <g transform="rotate(60, 256, 256)"><rect x="248" y="118" width="16" height="22" rx="3" /></g>
      <g transform="rotate(150, 256, 256)"><rect x="248" y="118" width="16" height="22" rx="3" /></g>
      <g transform="rotate(210, 256, 256)"><rect x="248" y="118" width="16" height="22" rx="3" /></g>
      <g transform="rotate(240, 256, 256)"><rect x="248" y="118" width="16" height="22" rx="3" /></g>
      <g transform="rotate(300, 256, 256)"><rect x="248" y="118" width="16" height="22" rx="3" /></g>
      <g transform="rotate(330, 256, 256)"><rect x="248" y="118" width="16" height="22" rx="3" /></g>
      <g transform="rotate(120, 256, 256)"><rect x="248" y="118" width="16" height="22" rx="3" /></g>
    </g>

    <!-- Gear inner fill -->
    <circle cx="256" cy="256" r="116" fill="#0e2268" />
  </g>

  <!-- ─── SHIELD / BADGE SHAPE ─── -->
  <!-- Brazil map-inspired irregular polygon as inner badge -->
  <path d="
    M 256 155
    C 290 158, 320 168, 335 188
    C 350 210, 348 235, 345 255
    C 342 278, 335 302, 318 322
    C 302 340, 278 352, 256 355
    C 234 352, 210 340, 194 322
    C 177 302, 170 278, 167 255
    C 164 232, 162 208, 177 188
    C 192 168, 222 158, 256 155 Z
  " fill="url(#badgeGrad)" stroke="rgba(100,170,255,0.4)" stroke-width="2" filter="url(#blueGlow)" />

  <!-- Badge inner highlight -->
  <path d="
    M 256 168
    C 285 171, 310 180, 323 197
    C 336 216, 334 238, 331 256
  " fill="none" stroke="rgba(160,200,255,0.2)" stroke-width="8" stroke-linecap="round" />

  <!-- ─── CERTIFICA TEXT IN BADGE ─── -->
  <!-- White square background for text (like PJe's style) -->
  <rect x="193" y="215" width="126" height="82" rx="6" fill="rgba(15,40,120,0.85)"
        stroke="rgba(120,180,255,0.35)" stroke-width="1.5" />

  <!-- "C" large letter (like the PJe style) -->
  <text x="217" y="282" font-family="Georgia, 'Times New Roman', serif"
        font-size="62" font-weight="bold" fill="white"
        text-anchor="middle" dominant-baseline="auto">C</text>

  <!-- "ertifica" smaller -->
  <text x="270" y="274" font-family="Georgia, 'Times New Roman', serif"
        font-size="28" font-style="italic" fill="white"
        text-anchor="middle" dominant-baseline="auto">ertifica</text>

  <!-- ─── BOTTOM NOTCH (like the image's bottom gap in outer ring) ─── -->
  <!-- Bottom cutout arc on outer ring -->
  <path d="M 215 440 A 205 205 0 0 0 297 440"
        fill="#0a1a5e" stroke="rgba(30,80,180,0.6)" stroke-width="2" />

  <!-- ─── ORANGE DIAMOND POINTER (bottom-right accent) ─── -->
  <g filter="url(#orangeGlow)" transform="translate(356, 370)">
    <polygon points="0,-14 12,0 0,14 -12,0" fill="#f5a623" opacity="0.95" />
  </g>

  <!-- ─── INNER RING ACCENT LINES ─── -->
  <!-- Left bottom arc notch detail -->
  <path d="M 148 370 A 130 130 0 0 0 180 420"
        fill="none" stroke="rgba(60,120,230,0.5)" stroke-width="14" stroke-linecap="round" />
  <path d="M 332 370 A 130 130 0 0 1 300 420"
        fill="none" stroke="rgba(60,120,230,0.5)" stroke-width="14" stroke-linecap="round" />

  <!-- ─── BOTTOM STATUS BAR ─── -->
  <rect x="24" y="454" width="464" height="34" rx="4" fill="rgba(5,15,60,0.85)"
        stroke="rgba(40,100,200,0.4)" stroke-width="1" />

  <!-- Version label box -->
  <rect x="34" y="460" width="90" height="20" rx="3" fill="rgba(20,60,160,0.7)"
        stroke="rgba(80,150,255,0.4)" stroke-width="1" />
  <text x="79" y="474" font-family="'Courier New', monospace" font-size="9"
        fill="#8ab4f8" text-anchor="middle">HUD v1.0</text>

  <!-- X button -->
  <text x="142" y="474" font-family="'Courier New', monospace" font-size="14"
        fill="rgba(180,200,255,0.5)" text-anchor="middle">✕</text>

  <!-- Status box -->
  <rect x="158" y="460" width="60" height="20" rx="3" fill="rgba(20,60,160,0.4)"
        stroke="rgba(60,120,220,0.3)" stroke-width="1" />

  <!-- App name in status bar -->
  <text x="280" y="474" font-family="'Courier New', monospace" font-size="11"
        fill="#8ab4f8" text-anchor="middle" letter-spacing="2">CERTIFICA</text>

  <!-- ─── OUTER BORDER GLOW ─── -->
  <rect x="2" y="2" width="508" height="508" rx="4"
        fill="none" stroke="rgba(40,100,220,0.15)" stroke-width="3" />
</svg>
