<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Updater Clover V2 Icon</title>
  <desc id="desc">A glossy green four-leaf clover inside a dark rounded square.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132217" />
      <stop offset="100%" stop-color="#08110b" />
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8dff7b" />
      <stop offset="55%" stop-color="#39df58" />
      <stop offset="100%" stop-color="#18933b" />
    </linearGradient>
    <linearGradient id="leafShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.35" />
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#4cff72" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect x="24" y="24" width="208" height="208" rx="52" fill="url(#bg)" />
  <rect x="28" y="28" width="200" height="200" rx="48" fill="none" stroke="rgba(110,255,135,0.18)" stroke-width="2" />

  <g filter="url(#shadow)">
    <rect x="60" y="60" width="136" height="136" rx="36" fill="#0d1710" />
  </g>

  <g filter="url(#glow)">
    <path d="M128 86c0-20 16-36 36-36s36 16 36 36c0 24-19 40-50 40h-22V86z" fill="url(#leaf)" />
    <path d="M128 86c0-20-16-36-36-36S56 66 56 86c0 24 19 40 50 40h22V86z" fill="url(#leaf)" />
    <path d="M128 170c0 20 16 36 36 36s36-16 36-36c0-24-19-40-50-40h-22v40z" fill="url(#leaf)" />
    <path d="M128 170c0 20-16 36-36 36s-36-16-36-36c0-24 19-40 50-40h22v40z" fill="url(#leaf)" />
    <rect x="121" y="80" width="14" height="98" rx="7" fill="#7dff8f" opacity="0.95" />
    <rect x="79" y="123" width="98" height="14" rx="7" fill="#7dff8f" opacity="0.95" />
  </g>

  <ellipse cx="128" cy="84" rx="56" ry="22" fill="#ffffff" opacity="0.08" />
</svg>
